name: Release MSIX

# Triggers on a version tag push, e.g. `git tag v1.0.1.0 && git push --tags`.
# Builds, signs with the PFX stored in secrets, and publishes a GitHub Release
# with the MSIX, .appinstaller, and public .cer attached.
on:
  push:
    tags:
      - 'v*.*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Four-part version to publish (e.g. 1.0.1.0). Leave blank to use tag.'
        required: false

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      # Install the full MAUI workload family. The csproj multi-targets
      # android/ios/maccatalyst/windows, so the SDK validates workloads for
      # every TFM before it'll build any of them. 'maui' is the umbrella
      # that pulls them all in.
      - name: Install MAUI workloads
        shell: pwsh
        run: dotnet workload install maui

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $v = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($v)) {
            $v = '${{ github.ref_name }}' -replace '^v', ''
          }
          if ($v -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            throw "Version '$v' is not four-part (expected N.N.N.N)"
          }
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$v"    | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Decode signing PFX from secret
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.SIGNING_CERT_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_B64)) {
            throw "SIGNING_CERT_PFX_BASE64 secret is not set. Run scripts/New-SigningCertificate.ps1 locally and upload the base64 of the PFX."
          }
          $bytes = [Convert]::FromBase64String($env:PFX_B64)
          New-Item -ItemType Directory -Force -Path certs | Out-Null
          [IO.File]::WriteAllBytes("certs/signing.pfx", $bytes)

      # Import the PFX into the user's certificate store and sign by
      # thumbprint instead of by keyfile. MSBuild's PackageCertificateKeyFile
      # loader chokes on modern (AES256/SHA2) PFX encryption on
      # windows-latest runners with errors like "Cannot import the key file"
      # / "The certificate specified is not valid for signing". Importing
      # with Import-PfxCertificate bypasses that code path entirely.
      - name: Import signing PFX into certificate store
        id: importcert
        shell: pwsh
        env:
          PFX_PWD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_PWD)) {
            throw "SIGNING_CERT_PASSWORD secret is not set."
          }
          $secure = ConvertTo-SecureString $env:PFX_PWD -AsPlainText -Force
          $pfxFull = (Resolve-Path 'certs/signing.pfx').Path
          $imported = Import-PfxCertificate `
              -FilePath $pfxFull `
              -CertStoreLocation 'Cert:\CurrentUser\My' `
              -Password $secure `
              -Exportable
          if (-not $imported) { throw "Import-PfxCertificate returned nothing." }
          $thumb = $imported.Thumbprint
          # Verify the imported cert actually has a code-signing EKU, otherwise
          # MSBuild will reject it with "not valid for signing" even though the
          # PFX imported cleanly.
          $hasCodeSignEku = $imported.Extensions |
              Where-Object { $_.Oid.Value -eq '2.5.29.37' } |
              ForEach-Object { $_.EnhancedKeyUsages | Where-Object { $_.Value -eq '1.3.6.1.5.5.7.3.3' } } |
              Select-Object -First 1
          if (-not $hasCodeSignEku) {
            throw "Imported cert (thumbprint $thumb) does not have the Code Signing EKU (1.3.6.1.5.5.7.3.3). Regenerate the PFX with scripts/New-SigningCertificate.ps1 and update the SIGNING_CERT_PFX_BASE64 secret."
          }
          "thumbprint=$thumb" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Imported signing cert: $thumb"

      - name: Export public CER from imported cert
        shell: pwsh
        env:
          THUMB: ${{ steps.importcert.outputs.thumbprint }}
        run: |
          $cert = Get-Item "Cert:\CurrentUser\My\$env:THUMB"
          Export-Certificate -Cert $cert -FilePath certs/MadinaEnterprises.cer | Out-Null

      - name: Build, sign, and stage release
        shell: pwsh
        env:
          THUMB: ${{ steps.importcert.outputs.thumbprint }}
        run: |
          ./scripts/Publish-MsixRelease.ps1 `
            -Version '${{ steps.ver.outputs.version }}' `
            -GitHubRepo '${{ github.repository }}' `
            -CertThumbprint $env:THUMB `
            -CerPath 'certs/MadinaEnterprises.cer' `
            -OutputDir 'publish'

      - name: Upload build artifact (for manual inspection)
        uses: actions/upload-artifact@v4
        with:
          name: MadinaEnterprises-${{ steps.ver.outputs.version }}
          path: publish/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Madina Enterprises ${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: 'true'
          files: |
            publish/MadinaEnterprises_${{ steps.ver.outputs.version }}_x64.msix
            publish/MadinaEnterprises.appinstaller
            publish/MadinaEnterprises.cer
